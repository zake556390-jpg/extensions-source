name: Build Procomic
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build Procomic Extension
        run: chmod +x gradlew && ./gradlew :src:ar:procomic:assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Procomic-APK
          path: "**/*.apk"
 
